<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#efe1c7" />
    <link rel="manifest" href="./manifest.webmanifest?v=72" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=97" />
    <title>Settings | Stimulant Journal</title>
  </head>
  <body data-page="settings">
    <div class="background">
      <div class="orb orb-one"></div>
      <div class="orb orb-two"></div>
      <div class="grid"></div>
    </div>

    <main class="app-shell">
      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Repair</p>
            <h2>🛠️ Edit entries</h2>
          </div>
        </div>
        <div class="stack-form compact-settings-form">
          <div class="entry-editor-toolbar">
            <div class="entry-filter-toggle" id="entryFilterToggle">
              <button class="entry-filter-btn active" data-filter="stim" type="button">💊 Stimulant</button>
              <button class="entry-filter-btn" data-filter="trt" type="button">💉 Testosterone</button>
            </div>
            <button id="reloadEntriesButton" class="ghost-button" type="button">Reload</button>
          </div>
          <div id="entryEditorEmpty" class="empty-state hidden">No entries saved yet.</div>
          <div id="entryEditorList" class="entry-editor-list"></div>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Personalize</p>
            <h2>🎯 Targets and inventory</h2>
          </div>
        </div>
        <form id="settingsForm" class="stack-form compact-settings-form">
          <div class="settings-grid settings-grid-core">
            <label>
              Medication
              <input id="medicationName" name="medicationName" type="text" maxlength="40" />
            </label>
            <label>
              Mg per tablet
              <input id="mgPerTablet" name="mgPerTablet" type="number" min="0" step="0.5" />
            </label>
            <label>
              Daily target
              <input id="dailyTarget" name="dailyTarget" type="number" min="0" step="1" />
            </label>
            <label>
              Monthly target
              <input id="monthlyTarget" name="monthlyTarget" type="number" min="0" step="1" />
            </label>
            <label>
              Target use-days
              <input id="doseDaysTarget" name="doseDaysTarget" type="number" min="0" step="1" />
            </label>
          </div>
          <details class="settings-disclosure">
            <summary><span>💊 Refill tracking</span></summary>
            <div class="settings-grid settings-grid-advanced">
              <label>
                Refill every (days)
                <input id="refillIntervalDays" name="refillIntervalDays" type="number" min="1" step="1" />
              </label>
              <label>
                Request early by (days)
                <input id="refillRequestLeadDays" name="refillRequestLeadDays" type="number" min="0" step="1" />
              </label>
            </div>
          </details>
          <details class="settings-disclosure">
            <summary><span>⚙️ Advanced settings</span></summary>
            <div class="settings-grid settings-grid-advanced">
              <label>
                Dose unit
                <input id="doseUnit" name="doseUnit" type="text" maxlength="12" placeholder="mg" />
              </label>
              <label>
                Decay half-life (hours)
                <input id="decayHalfLifeHours" name="decayHalfLifeHours" type="number" min="0.5" step="0.5" />
              </label>
              <label>
                Vacation threshold (days)
                <input id="vacationThreshold" name="vacationThreshold" type="number" min="1" step="1" />
              </label>
              <label>
                Low-dose threshold
                <input id="vacationDoseThreshold" name="vacationDoseThreshold" type="number" min="0" step="0.5" />
              </label>
              <label>
                Vacation cadence (days)
                <input id="vacationFrequencyDays" name="vacationFrequencyDays" type="number" min="1" step="1" />
              </label>
            </div>
          </details>
          <button class="nav-button emphasis-button compact-action-button" type="submit">Save Settings</button>
        </form>
      </section>

      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">TRT</p>
            <h2>💉 Testosterone compounds</h2>
          </div>
        </div>
        <div class="stack-form compact-settings-form">
          <div id="trtCompoundList" class="trt-compound-list"></div>
          <button id="addTrtCompound" class="ghost-button compact-action-button" type="button">+ Add compound</button>
          <p class="field-hint muted" style="text-align:center; margin: 0.25rem 0;">Changes save automatically</p>
          <details class="settings-disclosure">
            <summary><span>📦 TRT stock settings</span></summary>
            <div class="settings-grid settings-grid-advanced" id="trtStockFields">
              <label>
                Current stock (mL)
                <input id="trtStockMl" name="trtStockMl" type="number" min="0" step="0.1" />
              </label>
              <label>
                Vials on hand
                <input id="trtStockVials" name="trtStockVials" type="number" min="0" step="1" />
              </label>
              <label>
                Refill alert at (mL)
                <input id="trtRefillThresholdMl" name="trtRefillThresholdMl" type="number" min="0" step="0.5" />
              </label>
            </div>
          </details>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Backup</p>
            <h2>🗂️ Export or import data</h2>
          </div>
        </div>
        <div class="data-actions compact-actions">
          <button id="exportButton" class="nav-button emphasis-button" type="button">Export JSON</button>
          <label class="upload-button nav-button emphasis-button">
            Import JSON
            <input id="importInput" type="file" accept="application/json" />
          </label>
        </div>
      </section>


    </main>

            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>

        <span class="tab-label">Connect</span>

    <div id="toastBanner" class="toast-banner" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./journal-core.js?v=93"></script>
    <script src="./settings.js?v=83"></script>
  </body>
</html>
