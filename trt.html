<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#efe1c7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest?v=72" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=92" />
    <title>TRT | Stimulant Journal</title>
  </head>
  <body data-page="trt">
    <div class="background">
      <div class="orb orb-one"></div>
      <div class="orb orb-two"></div>
      <div class="grid"></div>
    </div>

    <main class="app-shell">

      <!-- Serum Level Chart -->
      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Serum Level</p>
            <h2>📈 Testosterone level</h2>
          </div>
        </div>
        <svg id="trtSerumChart" class="trt-serum-chart" viewBox="0 0 400 240" aria-label="Testosterone serum level chart"></svg>
        <div class="trt-range-toggle" id="trtRangeToggle">
          <button class="trt-range-btn" data-range="week" type="button">Week</button>
          <button class="trt-range-btn active" data-range="month" type="button">Month</button>
          <button class="trt-range-btn" data-range="3month" type="button">3 Months</button>
        </div>
        <div id="trtSerumLegend" class="trend-legend"></div>
      </section>

      <!-- Dose Entry -->
      <section class="card entry-card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Log</p>
            <h2>💉 Log injection</h2>
          </div>
        </div>
        <form id="trtDoseForm" class="stack-form compact-settings-form" novalidate>
          <div class="trt-dose-row">
            <label class="trt-dose-compound">
              Compound
              <select id="trtCompoundSelect" class="entry-input"></select>
            </label>
            <label class="trt-dose-ml">
              mL
              <input id="trtMlInput" name="trtMl" type="number" inputmode="decimal" min="0" step="0.05" placeholder="0.00" />
            </label>
            <div id="trtMgPreview" class="trt-mg-preview">= 0 mg</div>
          </div>
          <label class="entry-note-field">
            Note
            <textarea id="trtDoseNote" rows="2" maxlength="500" placeholder="Optional note"></textarea>
          </label>
          <label class="use-current-time-row">
            <input type="checkbox" id="trtUseCurrentTime" checked />
            Use current time
          </label>
          <label class="entry-field hidden" id="trtDateTimeField">
            Date/time
            <input id="trtDoseTime" type="datetime-local" />
          </label>
          <div class="entry-submit-row">
            <button class="primary-button" type="submit">Save Injection</button>
          </div>
        </form>
      </section>

      <!-- Stock Tracking -->
      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Inventory</p>
            <h2>📦 Stock on hand</h2>
          </div>
        </div>
        <div class="trt-stock-display">
          <div class="trt-stock-metric">
            <strong id="trtStockMlDisplay">0</strong>
            <span>mL remaining</span>
          </div>
          <div class="trt-stock-metric">
            <strong id="trtStockVialsDisplay">0</strong>
            <span>vials</span>
          </div>
          <div id="trtRefillAlert" class="trt-refill-alert hidden">
            ⚠️ Stock is low — time to reorder
          </div>
        </div>
        <div class="trt-stock-actions">
          <button id="trtRestockBtn" class="ghost-button" type="button">+ Restock</button>
          <button id="trtAdjustBtn" class="ghost-button" type="button">± Adjust</button>
        </div>
        <form id="trtRestockForm" class="stack-form compact-settings-form hidden" novalidate>
          <label>mL received<input id="trtRestockMl" type="number" min="0" step="0.1" placeholder="10" /></label>
          <label>Vials received<input id="trtRestockVials" type="number" min="0" step="1" placeholder="1" /></label>
          <div class="entry-submit-row">
            <button class="primary-button" type="submit">Save Restock</button>
          </div>
        </form>
        <form id="trtAdjustForm" class="stack-form compact-settings-form hidden" novalidate>
          <label>Adjust mL (negative to subtract)<input id="trtAdjustMl" type="number" step="0.1" placeholder="-0.5" /></label>
          <div class="entry-submit-row">
            <button class="primary-button" type="submit">Save Adjustment</button>
          </div>
        </form>
      </section>

      <!-- Dose Planner -->
      <section class="card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Plan</p>
            <h2>🗓️ Dose planner</h2>
          </div>
        </div>
        <svg id="trtPlannerChart" class="trt-serum-chart" viewBox="0 0 400 240" aria-label="Planned dose projection chart"></svg>
        <div class="trt-range-toggle" id="trtPlannerRangeToggle">
          <button class="trt-range-btn" data-range="week" type="button">Week</button>
          <button class="trt-range-btn active" data-range="month" type="button">Month</button>
          <button class="trt-range-btn" data-range="3month" type="button">3 Months</button>
        </div>
        <div id="trtPlannerLegend" class="trend-legend"></div>

        <div id="trtPlannerScheduleList" class="trt-planner-schedule-list"></div>

        <form id="trtPlannerForm" class="stack-form compact-settings-form" novalidate>
          <label>
            Compound
            <select id="trtPlannerCompoundSelect" class="entry-input"></select>
          </label>
          <div class="trt-planner-row">
            <label class="trt-planner-ml-label">
              Dose
              <input id="trtPlannerMlInput" name="plannerMl" type="number" inputmode="decimal" min="0" step="0.05" placeholder="mL" />
            </label>
            <label class="trt-planner-freq-label">
              Frequency
              <input id="trtPlannerFreqDays" type="number" inputmode="decimal" min="0.5" step="0.5" placeholder="days" />
            </label>
            <label class="trt-planner-doses-label">
              Repeat
              <input id="trtPlannerMaxDoses" type="number" inputmode="numeric" min="1" step="1" placeholder="∞" />
            </label>
          </div>
          <div class="entry-submit-row">
            <button class="primary-button" type="submit">Add Schedule</button>
          </div>
        </form>
      </section>

    </main>
