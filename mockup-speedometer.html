<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pace Gauge Mockup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ede0ca;
      font-family: "Avenir Next","Segoe UI",sans-serif;
      color: #1a1a2e;
      padding: 24px 16px 80px;
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; max-width: 420px; margin: 0 auto;
    }

    .section-tag {
      font-size: 0.65rem; color: #8e8ea8;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
      text-align: center; width: 100%;
    }

    .card {
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 20px;
      padding: 1.15rem;
      width: 100%;
    }

    .eyebrow {
      font-size: 0.62rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: #8e8ea8; font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .card-title {
      font-family: "Avenir Next Condensed","Franklin Gothic Medium",sans-serif;
      font-size: 1.45rem; font-weight: 800; margin-bottom: 1.1rem;
    }

    .gauges-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }
    .gauge-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 6px;
    }
    .gauge-cell + .gauge-cell {
      border-left: 1px solid rgba(0,0,0,0.07);
    }

    .speedometer-svg { width: 100%; height: auto; overflow: hidden; display: block; }

    .gauge-label {
      font-size: 0.7rem; font-weight: 700; color: #5a4a38;
      text-align: center; letter-spacing: 0.02em;
    }
    .gauge-sub {
      font-size: 0.6rem; color: #9e9e9e; text-align: center;
    }
    .gauge-zone-chip {
      font-size: 0.6rem; font-weight: 700;
      padding: 2px 9px; border-radius: 999px;
      margin-top: 2px; letter-spacing: 0.03em;
    }

    .controls { display: flex; flex-direction: column; gap: 12px; }
    .ctrl-row { display: flex; align-items: center; gap: 10px; }
    .ctrl-row label { font-size: 0.72rem; font-weight: 600; color: #7a6a5a; min-width: 98px; }
    .ctrl-row input[type=range] { flex: 1; accent-color: #b87333; }
    .ctrl-row span { font-size: 0.72rem; font-weight: 700; min-width: 44px; text-align: right; }

    .examples-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;
    }
    .example-card {
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 14px; padding: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .example-label { font-size: 0.6rem; font-weight: 700; color: #7a6a5a; text-align: center; }
  </style>
</head>
<body>

<p class="section-tag">Pace Gauge — Mockup</p>

<div class="card">
  <p class="eyebrow">Usage Pace</p>
  <h2 class="card-title">🏎️ Pace gauge</h2>
  <div class="gauges-row">
    <div class="gauge-cell">
      <svg id="gaugeMo" class="speedometer-svg" viewBox="0 0 200 175"></svg>
      <p class="gauge-label">Monthly pace</p>
      <p class="gauge-sub" id="moSub">Mar · — days in</p>
      <span class="gauge-zone-chip" id="moChip">—</span>
    </div>
    <div class="gauge-cell">
      <svg id="gauge7d" class="speedometer-svg" viewBox="0 0 200 175"></svg>
      <p class="gauge-label">Past 7 days</p>
      <p class="gauge-sub">Rolling average</p>
      <span class="gauge-zone-chip" id="wkChip">—</span>
    </div>
  </div>
</div>

<p class="section-tag">Interactive Controls</p>
<div class="card controls">
  <div class="ctrl-row">
    <label>Monthly pace</label>
    <input type="range" id="slMo" min="0" max="45" step="0.5" value="28">
    <span id="slMoVal">28.0 mg</span>
  </div>
  <div class="ctrl-row">
    <label>7-day avg</label>
    <input type="range" id="sl7d" min="0" max="45" step="0.5" value="32">
    <span id="sl7dVal">32.0 mg</span>
  </div>
</div>

<p class="section-tag">Static Zone Examples</p>
<div class="examples-grid">
  <div class="example-card">
    <svg class="speedometer-svg static-ex" viewBox="0 0 200 175" data-val="14"></svg>
    <p class="example-label">On target · 14 mg/day</p>
  </div>
  <div class="example-card">
    <svg class="speedometer-svg static-ex" viewBox="0 0 200 175" data-val="27"></svg>
    <p class="example-label">Moderate · 27 mg/day</p>
  </div>
  <div class="example-card">
    <svg class="speedometer-svg static-ex" viewBox="0 0 200 175" data-val="33"></svg>
    <p class="example-label">High · 33 mg/day</p>
  </div>
  <div class="example-card">
    <svg class="speedometer-svg static-ex" viewBox="0 0 200 175" data-val="40"></svg>
    <p class="example-label">Over limit · 40 mg/day</p>
  </div>
</div>

<script>
const ZONES = [
  { limit: 25, color: '#2d9e6b', bg: 'rgba(45,158,107,0.13)', label: 'On target'  },
  { limit: 30, color: '#d4900a', bg: 'rgba(212,144,10,0.12)',  label: 'Moderate'  },
  { limit: 35, color: '#d86020', bg: 'rgba(216,96,32,0.12)',   label: 'High'       },
  { limit: 45, color: '#c94040', bg: 'rgba(201,64,64,0.12)',   label: 'Over limit' },
];

function getZone(v) {
  return ZONES.find(z => v <= z.limit) || ZONES[ZONES.length - 1];
}

function drawSpeedometer(svgEl, value) {
  // 270° sweep gauge — start: 225° (lower-left), end: −45° (lower-right), through top
  const CX = 100, CY = 112, R = 80, TW = 15, NL = 58, MAX = 45;
  const START_DEG = 225, SWEEP = 270;

  const v = Math.min(Math.max(value, 0), MAX);
  const toRad = d => d * Math.PI / 180;

  // Value → angle in standard math degrees (counterclockwise from +x axis)
  const valToAngle = val => START_DEG - (Math.min(val, MAX) / MAX) * SWEEP;

  // Angle in standard degrees → SVG coordinate point on arc radius R
  const pt = (deg, r = R) => [
    +(CX + r * Math.cos(toRad(deg))).toFixed(2),
    +(CY - r * Math.sin(toRad(deg))).toFixed(2)
  ];

  const zone = getZone(v);
  let h = '';

  const [sx, sy] = pt(START_DEG);
  const [ex, ey] = pt(START_DEG - SWEEP); // = pt(-45)

  // ── 2. Zone coloured arcs (faint context) ──
  let prevDeg = START_DEG;
  let [ppx, ppy] = pt(START_DEG);
  for (const z of ZONES) {
    const ea = valToAngle(z.limit);
    const [epx, epy] = pt(ea);
    const span = Math.abs(prevDeg - ea);
    h += `<path d="M ${ppx} ${ppy} A ${R} ${R} 0 ${span > 180 ? 1 : 0} 1 ${epx} ${epy}"
      fill="none" stroke="${z.color}" stroke-width="${TW}" stroke-linecap="butt" opacity="0.22"/>`;
    prevDeg = ea;
    [ppx, ppy] = [epx, epy];
  }

  // ── 3. Active fill arc (from start to current value) ──
  if (v > 0.3) {
    const va = valToAngle(v);
    const [vx, vy] = pt(va);
    const span = START_DEG - va;
    h += `<path d="M ${sx} ${sy} A ${R} ${R} 0 ${span > 180 ? 1 : 0} 1 ${vx} ${vy}"
      fill="none" stroke="${zone.color}" stroke-width="${TW}" stroke-linecap="round" opacity="0.9"/>`;
  }

  // ── 4. Zone boundary ticks + labels ──
  for (const t of [25, 30, 35]) {
    const ta = toRad(valToAngle(t));
    const inR = R - TW / 2 - 1, outR = R + TW / 2 + 3, lblR = R + TW / 2 + 14;
    const [ix, iy] = [+(CX + inR * Math.cos(ta)).toFixed(1), +(CY - inR * Math.sin(ta)).toFixed(1)];
    const [ox, oy] = [+(CX + outR * Math.cos(ta)).toFixed(1), +(CY - outR * Math.sin(ta)).toFixed(1)];
    const [lx, ly] = [+(CX + lblR * Math.cos(ta)).toFixed(1), +(CY - lblR * Math.sin(ta)).toFixed(1)];
    h += `<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="rgba(255,255,255,0.92)" stroke-width="2.2"/>`;
    h += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle"
      font-size="7" fill="rgba(0,0,0,0.4)" font-weight="700"
      font-family="'Avenir Next',sans-serif">${t}</text>`;
  }

  // ── 5. Needle (tapered triangle + shadow) ──
  const na = toRad(valToAngle(v));
  const [tipX, tipY] = [+(CX + NL * Math.cos(na)).toFixed(2), +(CY - NL * Math.sin(na)).toFixed(2)];
  const bw = 3.2;
  const pts = [
    `${+(CX + Math.sin(na) * bw).toFixed(2)},${+(CY + Math.cos(na) * bw).toFixed(2)}`,
    `${+(CX - Math.sin(na) * bw).toFixed(2)},${+(CY - Math.cos(na) * bw).toFixed(2)}`,
    `${tipX},${tipY}`
  ].join(' ');
  h += `<polygon points="${pts}" fill="rgba(0,0,0,0.14)" transform="translate(1.5,2)"/>`;
  h += `<polygon points="${pts}" fill="#2a1810"/>`;

  // ── 6. Center hub ──
  h += `<circle cx="${CX}" cy="${CY}" r="8" fill="#2a1810"/>`;
  h += `<circle cx="${CX}" cy="${CY}" r="3.5" fill="rgba(255,255,255,0.62)"/>`;

  // ── 7. Value + unit (centred inside gauge) ──
  h += `<text x="${CX}" y="${CY - 24}" text-anchor="middle"
    font-size="34" font-weight="800" fill="#1a1a2e"
    font-family="'Avenir Next Condensed','Franklin Gothic Medium',sans-serif">${v.toFixed(1)}</text>`;
  h += `<text x="${CX}" y="${CY - 6}" text-anchor="middle"
    font-size="7.5" fill="#9e9e9e" letter-spacing="0.07em" font-weight="700"
    font-family="'Avenir Next',sans-serif">MG / DAY</text>`;

  svgEl.innerHTML = h;
}

function updateChip(id, value) {
  const z = getZone(value);
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = z.label;
  el.style.color = z.color;
  el.style.background = z.bg;
}

function update() {
  const mo = parseFloat(document.getElementById('slMo').value);
  const wd = parseFloat(document.getElementById('sl7d').value);
  document.getElementById('slMoVal').textContent = mo.toFixed(1) + ' mg';
  document.getElementById('sl7dVal').textContent = wd.toFixed(1) + ' mg';
  drawSpeedometer(document.getElementById('gaugeMo'), mo);
  drawSpeedometer(document.getElementById('gauge7d'), wd);
  updateChip('moChip', mo);
  updateChip('wkChip', wd);
  const now = new Date();
  document.getElementById('moSub').textContent =
    now.toLocaleString('default', { month: 'short' }) + ' · ' + now.getDate() + ' days in';
}

document.querySelectorAll('.static-ex').forEach(svg =>
  drawSpeedometer(svg, parseFloat(svg.dataset.val))
);

document.getElementById('slMo').addEventListener('input', update);
document.getElementById('sl7d').addEventListener('input', update);
update();
</script>
</body>
</html>
